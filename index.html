<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>London Adventure</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  font-family: 'Inter', sans-serif;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
  background: black;
}

/* Background image */
.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('https://images.unsplash.com/photo-1505761671935-60b3a7427bad') no-repeat center/cover;
  filter: brightness(0.6);
}

/* Skyline */
.skyline {
  position: absolute;
  bottom: 0;
  width: 200%;
  height: 120px;
  background: url('https://svgshare.com/i/15wL.svg') repeat-x;
  background-size: contain;
  opacity: 0.25;
  animation: move 60s linear infinite;
}

@keyframes move {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* Content */
.container {
  position: relative;
  z-index: 2;
  max-width: 700px;
  padding: 40px;
  animation: fadeIn 1.2s ease;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
}

.subtitle {
  margin: 10px 0 30px;
  opacity: 0.85;
}

.countdown {
  font-size: 2.8rem;
  font-weight: 600;
  margin-bottom: 10px;
}

.label {
  font-size: 0.8rem;
  opacity: 0.6;
  letter-spacing: 2px;
}

.weather {
  margin-top: 25px;
  font-size: 0.9rem;
  opacity: 0.7;
}

/* Hidden plan */
.plan {
  display: none;
  margin-top: 30px;
  font-size: 1.1rem;
  line-height: 1.6;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="skyline"></div>

<div class="container">
  <h1>Greg & Shiphra</h1>
  <div class="subtitle">London Adventure</div>

  <div id="countdown" class="countdown"></div>
  <div class="label">until it begins</div>

  <div id="weather" class="weather"></div>

  <div id="plan" class="plan">
    <strong>The Plan:</strong><br><br>
    • Arrive in London<br>
    • Explore somewhere unexpected<br>
    • Good food, no rush<br>
    • Just a good day together
  </div>
</div>

<script>
const target = new Date('2026-05-18T11:00:00');

function updateCountdown() {
  const now = new Date();
  const diff = target - now;

  if (diff <= 0) {
    document.getElementById('countdown').innerText = 'We made it.';
    document.getElementById('plan').style.display = 'block';
    return;
  }

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff / (1000*60*60)) % 24);
  const m = Math.floor((diff / (1000*60)) % 60);
  const s = Math.floor((diff / 1000) % 60);

  document.getElementById('countdown').innerText =
    `${d}d ${h}h ${m}m ${s}s`;
}

setInterval(updateCountdown, 1000);
updateCountdown();

/* Simple weather (no API key version using open-meteo) */
fetch("https://api.open-meteo.com/v1/forecast?latitude=51.5072&longitude=-0.1276&current_weather=true")
  .then(res => res.json())
  .then(data => {
    const temp = data.current_weather.temperature;
    document.getElementById("weather").innerText =
      `London right now: ${temp}°C`;
  });
</script>

</body>
</html>
